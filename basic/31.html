<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탭 메뉴형 네비게이션</title>
    <Style>
        * { margin : 0; padding: 0; }
        ul, li { list-style: none; }
        a { color : #000; text-decoration: none; }

        body { font: 12px 굴림; margin: 10px; }


        #gnb {
            width: 525px;
            height: 50px;
            padding: 5px;
            background-color: #ddf;
        }
        #gnb li {
            display: inline;
        }
        #gnb li a{
            float: left;
            width: 100px;
            height: 40px;
            text-align: center;
            border-top: 7px solid #77f;
            margin-left: 5px;
            background-color: #ccf;
            color : #666;
            transition: all 0.5s;
        }
        #gnb li a:hover {
            background-color: #eef;
            color: #000;
        }
        gnb li a span {
            display: block;

        }
</Style>
</head>
<body>
    <ul id="gnb">
        <li><a href="#">회사소개<span> COMPANY</span></a></li>
        <li><a href="#">제품안내<span> PRODUCTS</span></a></li>
        <li><a href="#">고객지원<span>CUSOMER</span></a></li>
        <li><a href="#">채용정보<span> RECRUIT</span></a></li>
        <li><a href="#">커뮤니티<span> COMMUNITY</span></a></li>
    </ul>
</body>
</html>
