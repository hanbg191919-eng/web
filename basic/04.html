<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 기초 - P태그</title>
<head>
<body>
    <p>배고파 배배배</p>
    <p>
        단락을 정의하는 p요소는 블록 요소이므로 줄바꿈이 일어남
    </p>
    <p>
        p 요소는 텍스트와 <Strong> 인라인 요소</Strong>를 포함할 수 있지만 같은 <h1>블록요소</h1>는 
        포함할 수 없다.
    </p>
</body>
</html>
