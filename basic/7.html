<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML기초 - 텍스트요소</title>
</head>
<body>
    <h2>강조</h2>
    <p>이제는 <em>반응형 웹</em>이 대세이다.</p>
    <p>이제는 <strong>반응형 웹</strong>이 대세이다.</p>

    <h2>생략어와 두문자어</h2>
    <p><addr title="Long Term Services">LTS</addr></p>

    <h2>추가금과 삭제금</h2>
    <p>정기세일 : <del>8.30 - 9.15</del></p>
    <p>정기세일 : <ins>9.01 -  9.30</ins></p>

    <h2>윗첨자와 아래첨자</h2>
    <p>x<sup>2</sup></p>
    <p>co<sab>2</sab></p>
</body>
</html>
