<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진행 상태 표시</title>
</head>
<body>
    <h1>progress 태그와 meter 태그</h1>

    <h2>파일 다운로드</h2>
    <p>다운로드 진행: <progress max="100"><span>0</span>%</progress></p>

    <h2>투표상황</h2>
    <p>현재 투표 진행상황: <meter value="20" min="0" max="100" high="65" low="30">20%</meter></p>
    <p>현재 투표 진행상황: <meter value="40" min="0" max="100" high="65" low="30">40%</meter></p>
    <p>현재 투표 진행상황: <meter value="70" min="0" max="100" high="65" low="30">70%</meter></p>
    
</body>
</html>
